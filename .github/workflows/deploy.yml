# Deploy to Ubuntu server on every push to main
# Required secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PRIVATE_KEY
# Optional: DEPLOY_SSH_PORT, DEPLOY_REPO_DIR, OPENAI_API_KEY (written to .env on server when deploying)
# On server: .env must have (API_BASE_URL, QDRANT_HOST, ...). OPENAI_API_KEY from GitHub Secret is written to .env if set.

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Ubuntu server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_DIR: ${{ secrets.DEPLOY_REPO_DIR }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          envs: REPO_DIR,OPENAI_API_KEY,LLM_BASE_URL
          script: |
            set -e
            REPO_DIR="${REPO_DIR:-$HOME/lakeflow}"
            cd "$REPO_DIR"
            git pull origin main
            export LAKEFLOW_DATA_PATH=/datalake/research
            if [ -n "${OPENAI_API_KEY:-}" ]; then
              touch .env
              grep -v '^OPENAI_API_KEY=' .env > .env.tmp 2>/dev/null || true
              mv .env.tmp .env
              echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
            fi
            if [ -n "${LLM_BASE_URL:-}" ]; then
              grep -v '^LLM_BASE_URL=' .env > .env.tmp 2>/dev/null || true
              mv .env.tmp .env
              echo "LLM_BASE_URL=${LLM_BASE_URL}" >> .env
            fi
            # Backend Dockerfile needs BuildKit (torch CPU first, cache mount). Required to avoid pulling CUDA ~2GB.
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml down
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --build
